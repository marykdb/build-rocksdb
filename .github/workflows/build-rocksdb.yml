  mingw-x64:
    name: Windows (MinGW) x86_64
    runs-on: windows-2022
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          ref: ${{ github.sha }}
          fetch-depth: 0
      - name: Install build dependencies
        run: |
          choco install -y ninja 7zip
      - name: Provision WinLibs GCC toolchain
        run: |
          set -euo pipefail
          TOOLCHAIN_DIR="$PWD/toolchains"
          WINLIBS_VERSION="9.5.0"
          WINLIBS_RELEASE="9.5.0-10.0.0-msvcrt-r1"
          ARCHIVE_NAME="winlibs-x86_64-posix-seh-gcc-${WINLIBS_VERSION}-mingw-w64msvcrt-10.0.0-r1.zip"
          ARCHIVE_PATH="$PWD/${ARCHIVE_NAME}"
          curl --fail --location --silent --show-error             "https://github.com/brechtsanders/winlibs_mingw/releases/download/${WINLIBS_RELEASE}/${ARCHIVE_NAME}"             --output "$ARCHIVE_PATH"
          WINLIBS_ROOT="$TOOLCHAIN_DIR/winlibs-gcc-${WINLIBS_VERSION}"
          rm -rf "$WINLIBS_ROOT"
          mkdir -p "$WINLIBS_ROOT"
          7z x "$ARCHIVE_PATH" -o"$WINLIBS_ROOT" >/dev/null
          rm -f "$ARCHIVE_PATH"
          if [[ -d "$WINLIBS_ROOT/mingw64" ]]; then
            MINGW_ROOT="$WINLIBS_ROOT/mingw64"
          else
            MINGW_ROOT="$(find "$WINLIBS_ROOT" -maxdepth 2 -type d -name 'mingw64' | head -n 1)"
          fi
          if [[ -z "$MINGW_ROOT" || ! -d "$MINGW_ROOT/bin" ]]; then
            echo "Failed to locate mingw64 directory inside WinLibs archive" >&2
            exit 1
          fi
          if command -v cygpath >/dev/null 2>&1; then
            MINGW_ROOT_UNIX="$(cygpath -u "$MINGW_ROOT")"
            BIN_UNIX="$(cygpath -u "$MINGW_ROOT/bin")"
          else
            MINGW_ROOT_UNIX="$MINGW_ROOT"
            BIN_UNIX="$MINGW_ROOT/bin"
          fi
          CC_PATH="$BIN_UNIX/x86_64-w64-mingw32-gcc.exe"
          CXX_PATH="$BIN_UNIX/x86_64-w64-mingw32-g++.exe"
          AR_PATH="$BIN_UNIX/x86_64-w64-mingw32-gcc-ar.exe"
          RANLIB_PATH="$BIN_UNIX/x86_64-w64-mingw32-gcc-ranlib.exe"
          STRIP_PATH="$BIN_UNIX/strip.exe"
          NM_PATH="$BIN_UNIX/x86_64-w64-mingw32-gcc-nm.exe"
          OBJCOPY_PATH="$BIN_UNIX/objcopy.exe"
          OBJDUMP_PATH="$BIN_UNIX/objdump.exe"
          RC_PATH="$BIN_UNIX/windres.exe"
          if [[ ! -x "$RC_PATH" ]]; then
            RC_PATH="$BIN_UNIX/x86_64-w64-mingw32-windres.exe"
          fi
          {
            echo "MINGW_TRIPLE=x86_64-w64-mingw32"
            echo "MINGW_SYSROOT=$MINGW_ROOT_UNIX"
            echo "MINGW_GCC92_SYSROOT=$MINGW_ROOT_UNIX"
            echo "MINGW_FALLBACK_SYSROOT=$MINGW_ROOT_UNIX"
            echo "WINLIBS_BIN=$BIN_UNIX"
            echo "BZIP2_GCC_BIN_DIR=$BIN_UNIX"
            echo "BZIP2_GCC_SYSROOT=$MINGW_ROOT_UNIX"
            echo "CC=$CC_PATH"
            echo "CXX=$CXX_PATH"
            echo "AR=$AR_PATH"
            echo "RANLIB=$RANLIB_PATH"
            echo "STRIP=$STRIP_PATH"
            echo "NM=$NM_PATH"
            echo "OBJCOPY=$OBJCOPY_PATH"
            echo "OBJDUMP=$OBJDUMP_PATH"
            echo "RC=$RC_PATH"
            echo "CMAKE_AR=$AR_PATH"
            echo "CMAKE_RANLIB=$RANLIB_PATH"
            echo "CMAKE_NM=$NM_PATH"
            echo "CMAKE_OBJCOPY=$OBJCOPY_PATH"
            echo "CMAKE_OBJDUMP=$OBJDUMP_PATH"
            echo "CFLAGS="
            echo "CXXFLAGS="
            echo "LDFLAGS="
          } >> "$GITHUB_ENV"
          echo "$BIN_UNIX" >> "$GITHUB_PATH"
      - name: Build Windows MinGW package
        run: ./build.sh mingwX64
      - name: Verify libstdc++ usage in MinGW build
        run: |
          set -euo pipefail
          LIB_PATH="build/lib/mingw_x86_64/rocksdb-build/librocksdb.a"
          if [[ ! -f "$LIB_PATH" ]]; then
            LIB_PATH="build/lib/mingw_x86_64/librocksdb.a"
          fi
          if [[ ! -f "$LIB_PATH" ]]; then
            echo "Failed to locate built librocksdb.a in expected directories" >&2
            exit 1
          fi
          NM_BIN="x86_64-w64-mingw32-gcc-nm.exe"
          if ! command -v "$NM_BIN" >/dev/null 2>&1; then
            NM_BIN="gcc-nm"
          fi
          if ! command -v "$NM_BIN" >/dev/null 2>&1; then
            echo "Error: Unable to locate an nm tool for inspection" >&2
            exit 1
          fi
          if "$NM_BIN" -C "$LIB_PATH" | grep -q "std::__1::"; then
            echo "Error: Detected libc++ symbols (std::__1) in librocksdb.a. Expected libstdc++." >&2
            exit 1
          fi
      - name: Check MinGW refptr rewrites
        run: ./scripts/verify-mingw-refptr.sh build/lib/mingw_x86_64 x86_64-w64-mingw32
      - uses: actions/upload-artifact@v4
        with:
          name: rocksdb-mingw-x86_64
          path: build/archives/rocksdb-mingw-x86_64.zip

  macos-x64:
    name: macOS x86_64
    runs-on: macos-latest
